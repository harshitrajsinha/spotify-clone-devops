name: CI pipeline to run basic sanity testing and create and push docker image

on:
  push:
    branches:
      # - main
      - dev
    paths:
      - 'backend/**'
      - '.github/workflows/**' # to be removed in production
permissions:
  contents: read

defaults:
  run:
    working-directory: backend

jobs:

  security-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      
      - name: Install dependencies
        run: npm ci
      
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
      
      ### SCA: Secrets scan

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_NOTIFY_USER_LIST: '@harshitrajsinha'

      ### Dependency scan:

      - name: Dependency scan
        uses: oke-py/npm-audit-action@v4.0.2
        with:
          audit_level: high
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_assignees: harshitrajsinha
          issue_labels: vulnerability,test
          working_directory: backend
      - name: Display audit report
        run: npm audit --audit-level=high || true
      
      ## File system scan:
      
      - name: Scan file system
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scanners: vuln,secret,misconfig
          scan-ref: '.'
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      ### SAST: 

      - name: Sonarqube scan
        if: github.ref == 'refs/heads/dev'
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        with:
          args: >
            "-Dsonar.projectName=spotify-clone-devops"
            -Dsonar.projectKey=spotify-clone-devops
            -Dsonar.sources=src
            -Dsonar.verbose=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}


      ### SBOM generation:
      # Note -> Here we are generating dependency graph directly to GitHub insights rather than separate artifact
      - name: SBOM generation
        if: github.ref == 'refs/heads/dev'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          format: 'github'
          output: 'dependency-results.sbom.json'
          scan-ref: '.'
          skip-setup-trivy: true
          github-pat: ${{ secrets.GITHUB_TOKEN }}