services:
  traefik:
    image: traefik:v3.7
    container_name: "traefik"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.network=traefik"
      - "--entrypoints.web.address=:80"
      - "--providers.docker.exposedbydefault=false" # starting with disabling any container to be exposed to traefik and later explicitly enabling specific container.
    networks:
      - traefik
    ports:
      - "80:80"
      - "8080:8080" # For traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # this will allow all containers to be in expose state to traefik (Not secure but require for service discovery). That's why exposedbydefault=false
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    image: backend-image:latest
    expose:
      - "8000"
    env_file:
      - backend/.env
    restart: unless-stopped
    deploy:
      replicas: 1 # Pre-specify replicas based on capability of t3a.medium because auto-scaling is not possible in docker
    networks:
      - traefik
    labels:
      - "traefik.enable=true" # Enabling will allow exposing "this" container to traefik
      - "traefik.http.routers.backend.rule=Host(`localhost`) && PathPrefix(`/api`)"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.routers.backend.priority=10"
  
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      secrets:
        - spotify-frontend-env
    image: frontend-image:latest
    expose:
      - "80"
    networks:
      - traefik
    restart: unless-stopped
    deploy:
      replicas: 1
    labels:
      - "traefik.enable=true" # Enabling will allow exposing "this" container to traefik
      - "traefik.http.routers.frontend.rule=Host(`localhost`) && PathPrefix(`/`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.http.routers.frontend.priority=1"

networks:
  traefik:
    driver: bridge
secrets:
  spotify-frontend-env:
    file: frontend/.env
